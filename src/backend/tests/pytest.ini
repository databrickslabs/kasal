[tool:pytest]
# Pytest configuration for backend tests

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    asyncio: Tests that use asyncio

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=src
    --cov-report=term-missing
    --cov-report=html:tests/coverage_html
    --cov-report=xml:tests/coverage.xml
    --cov-fail-under=80
    -W "ignore::DeprecationWarning:pyspark"
    -W "ignore::PendingDeprecationWarning:starlette"
    -W "ignore:Add type hints:UserWarning:mlflow"

# Async support
asyncio_mode = auto

# Filter warnings — suppress noisy third-party warnings
filterwarnings =
    ignore::DeprecationWarning:pyspark.*
    ignore::DeprecationWarning:pydantic.*
    ignore::DeprecationWarning:distutils.*
    ignore::PendingDeprecationWarning:starlette.*
    ignore::PendingDeprecationWarning:multipart.*
    ignore:Add type hints:UserWarning:mlflow.*
    ignore::UserWarning:sqlalchemy.*
    ignore::RuntimeWarning:unittest.*
    ignore::RuntimeWarning:litellm.*
    ignore::RuntimeWarning:asyncio.*

# Test timeout (in seconds)
timeout = 300