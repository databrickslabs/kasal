command: ['python', 'entrypoint.py', '--db-type', 'postgres']

env:
  - name: PYTHONPATH
    value: './backend'
  - name: PYTHONUNBUFFERED
    value: '1'
  - name: FRONTEND_STATIC_DIR
    value: './frontend_static'
  - name: KASAL_LOG_LEVEL
    value: 'INFO'
  - name: KASAL_LOG_APP
    value: 'INFO'
  - name: KASAL_LOG_THIRD_PARTY
    value: 'WARNING'
  - name: KASAL_LOG_CONSOLE
    value: 'true'
  - name: KASAL_LOG_FILE
    value: 'true'
  - name: DATABASE_TYPE
    value: 'postgres'
  - name: POSTGRES_SERVER
    valueFrom: lakebase-server
  - name: POSTGRES_USER
    value: 'david.schwarzenbacher@databricks.com'
  - name: POSTGRES_PASSWORD
    valueFrom: lakebase-pat
  - name: POSTGRES_DB
    value: 'kasal'
  - name: POSTGRES_PORT
    value: '5432'
  - name: POSTGRES_SSL
    value: 'true'
  - name: LAKEBASE_INSTANCE_NAME
    value: 'kasal-db'

resources:
  - name: lakebase-server
    type: secret
    scope: kasal
    key: lakebase_server
  - name: lakebase-pat
    type: secret
    scope: kasal
    key: lakebase_pat

apt_packages:
  - libpq-dev
